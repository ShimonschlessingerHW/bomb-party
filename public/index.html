<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomb Party</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── HOME VIEW ── -->
  <div id="view-home" class="view active">
    <div class="home-container">
      <div class="logo-area">
        <div class="logo-bomb">💣</div>
        <h1 class="logo-title">BOMB PARTY</h1>
        <p class="logo-sub">Type a word containing the letters before the bomb explodes!</p>
      </div>
      <div class="home-card">
        <input type="text" id="username-input" class="text-input" placeholder="Your name" maxlength="20" autocomplete="off">
        <div class="home-actions">
          <button id="create-room-btn" class="btn btn-primary">Create Room</button>
          <div class="divider"><span>or</span></div>
          <div class="join-row">
            <input type="text" id="room-code-input" class="text-input code-input" placeholder="ROOM" maxlength="4" autocomplete="off">
            <button id="join-room-btn" class="btn btn-secondary">Join</button>
          </div>
        </div>
        <p id="home-error" class="error-text"></p>
      </div>
    </div>
  </div>

  <!-- ── LOBBY VIEW ── -->
  <div id="view-lobby" class="view">
    <div class="lobby-container">
      <div class="lobby-header">
        <h2>Waiting Room</h2>
        <div class="room-code-badge">
          <span class="room-code-label">Room Code</span>
          <span class="room-code-value" id="lobby-room-code"></span>
          <button class="copy-btn" id="copy-code-btn" title="Copy code">⎘</button>
        </div>
      </div>
      <p class="lobby-hint">Share the room code with your friends!</p>
      <div class="lobby-players" id="lobby-players"></div>
      <div class="lobby-actions">
        <button id="start-game-btn" class="btn btn-primary" style="display:none">▶ Start Game</button>
        <button id="leave-lobby-btn" class="btn btn-ghost">← Leave</button>
      </div>
    </div>
  </div>

  <!-- ── GAME VIEW ── -->
  <div id="view-game" class="view">
    <div class="game-layout">

      <!-- Left: Player List -->
      <aside class="players-sidebar" id="players-sidebar"></aside>

      <!-- Center: Game Area -->
      <main class="game-center">
        <div class="game-topbar">
          <span class="topbar-room">💣 <strong id="game-room-code"></strong></span>
          <span class="topbar-round" id="topbar-round">Round 1</span>
        </div>

        <!-- Bomb -->
        <div class="bomb-area">
          <div class="bomb-wrapper" id="bomb-wrapper">
            <svg class="fuse-svg" viewBox="0 0 60 50" xmlns="http://www.w3.org/2000/svg">
              <path class="fuse-path" d="M30 10 Q45 5 40 0" stroke="#c8a04a" stroke-width="3" fill="none" stroke-linecap="round"/>
              <circle class="fuse-spark" cx="40" cy="0" r="3" fill="#ff6a00"/>
            </svg>
            <div class="bomb-body">
              <div class="bomb-timer" id="bomb-timer">10</div>
            </div>
          </div>
        </div>

        <!-- Prompt & Status -->
        <div class="prompt-section">
          <div class="turn-label" id="turn-label">Waiting for game to start…</div>
          <div class="prompt-display" id="prompt-display">
            <span class="prompt-letters" id="prompt-letters">– –</span>
          </div>
          <div class="last-word-display" id="last-word-display"></div>
        </div>

        <!-- Word Input -->
        <div class="input-section">
          <div class="word-input-wrap">
            <input type="text" id="word-input" class="word-input" placeholder="type a word…"
                   autocomplete="off" spellcheck="false" autocorrect="off" disabled>
          </div>
          <div class="input-feedback" id="input-feedback"></div>
        </div>
      </main>

    </div>
  </div>

  <!-- ── GAME OVER VIEW ── -->
  <div id="view-gameover" class="view">
    <div class="gameover-container">
      <div class="gameover-boom">💥</div>
      <h1 class="gameover-title">Game Over!</h1>
      <p class="gameover-winner" id="gameover-winner"></p>
      <div class="gameover-actions">
        <button id="play-again-btn" class="btn btn-primary" style="display:none">Play Again</button>
        <button id="home-btn" class="btn btn-ghost">Home</button>
      </div>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
